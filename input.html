<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input Transaksi — Buku Kas Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>

  <main class="main-content">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="hamburger-btn btn btn-secondary" style="padding:8px 10px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div>
          <h1 class="font-display" style="font-size:20px; font-weight:600; margin:0;">Input Transaksi</h1>
          <p style="color:var(--dm-text-muted); font-size:13px; margin:2px 0 0;">Catat pemasukan dan pengeluaran harian</p>
        </div>
      </div>
    </div>

    <!-- Tab switch -->
    <div class="card" style="padding:6px; display:flex; gap:4px; margin-bottom:20px; max-width:360px;">
      <button id="tab-pemasukan" class="btn" style="background:var(--dm-emerald); color:#fff; flex:1;">Pemasukan</button>
      <button id="tab-pengeluaran" class="btn btn-secondary" style="border:none; flex:1;">Pengeluaran</button>
    </div>

    <div class="card" style="padding:26px; max-width:640px;">
      <form id="transaksi-form">
        <input type="hidden" id="jenis-transaksi" value="Pemasukan">

        <div class="form-row-2">
          <div>
            <label class="field-label">Hari</label>
            <input id="input-hari" class="field-input" disabled>
          </div>
          <div>
            <label class="field-label" for="input-tanggal">Tanggal</label>
            <input id="input-tanggal" type="date" class="field-input" required>
          </div>
        </div>

        <div class="form-row-2" style="margin-top:14px;">
          <div>
            <label class="field-label" for="input-waktu">Waktu</label>
            <input id="input-waktu" type="time" class="field-input" required>
          </div>
          <div>
            <label class="field-label" for="input-kategori">Kategori</label>
            <select id="input-kategori" class="field-input" required></select>
          </div>
        </div>

        <div style="margin-top:14px;">
          <label class="field-label" for="input-nominal">Nominal (Rp)</label>
          <input id="input-nominal" class="field-input font-ledger" inputmode="numeric" placeholder="0" required>
        </div>

        <div style="margin-top:14px;">
          <label class="field-label" for="input-keterangan">Deskripsi / Keterangan</label>
          <textarea id="input-keterangan" class="field-input" rows="2" placeholder="Contoh: Pembayaran SPP santri kelas 2 - Ahmad Fauzi"></textarea>
        </div>

        <div style="margin-top:14px;">
          <label class="field-label" for="input-admin">Nama Admin Penanggung Jawab</label>
          <select id="input-admin" class="field-input" required></select>
        </div>

        <div style="margin-top:14px;">
          <label class="field-label" for="input-bukti">Bukti Transfer / Nota (opsional)</label>
          <input id="input-bukti" type="file" accept="image/*,.pdf" class="field-input">
          <p style="font-size:12px; color:var(--dm-text-muted); margin-top:5px;">Akan otomatis tersimpan ke Google Drive dan tertaut pada baris transaksi ini.</p>
        </div>

        <button type="submit" id="submit-btn" class="btn btn-primary" style="width:100%; margin-top:22px; padding:12px;">
          Simpan Transaksi
        </button>
      </form>
    </div>
  </main>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/transaksi.js"></script>
</body>
</html>
