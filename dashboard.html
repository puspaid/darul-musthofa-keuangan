<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Buku Kas Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-shell">
  <div id="sidebar-mount"></div>

  <main class="main-content">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="hamburger-btn btn btn-secondary" style="padding:8px 10px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div>
          <h1 class="font-display" style="font-size:20px; font-weight:600; margin:0;">Dashboard</h1>
          <p style="color:var(--dm-text-muted); font-size:13px; margin:2px 0 0;" id="today-label"></p>
        </div>
      </div>
      <button id="refresh-btn" class="btn btn-secondary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-2.64-6.36M21 4v6h-6"/></svg>
        Muat Ulang
      </button>
    </div>

    <!-- Stat cards -->
    <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px;" id="stat-cards">
      <div class="card stat-card income">
        <div class="stat-label">Total Pemasukan (Bulan Ini)</div>
        <div class="stat-value" id="stat-income">Rp 0</div>
      </div>
      <div class="card stat-card expense">
        <div class="stat-label">Total Pengeluaran (Bulan Ini)</div>
        <div class="stat-value" id="stat-expense">Rp 0</div>
      </div>
      <div class="card stat-card balance">
        <div class="stat-label">Saldo Kas Saat Ini</div>
        <div class="stat-value" id="stat-balance">Rp 0</div>
      </div>
    </div>

    <!-- Chart -->
    <div class="card" style="margin-top:20px; padding:22px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:10px;">
        <h2 class="font-display" style="font-size:15.5px; font-weight:600; margin:0;">Tren Keuangan — 12 Bulan Terakhir</h2>
      </div>
      <div style="position:relative; height:300px;">
        <canvas id="trend-chart"></canvas>
      </div>
    </div>

    <!-- Recent transactions -->
    <div class="card" style="margin-top:20px;">
      <div style="padding:18px 20px 6px; display:flex; justify-content:space-between; align-items:center;">
        <h2 class="font-display" style="font-size:15.5px; font-weight:600; margin:0;">Transaksi Terbaru</h2>
        <a href="laporan.html" style="font-size:13px; color:var(--dm-emerald); font-weight:600; text-decoration:none;">Lihat semua &rarr;</a>
      </div>
      <div style="overflow-x:auto;">
        <table class="dm-table" id="recent-table">
          <thead>
            <tr><th>No. Ref</th><th>Tanggal</th><th>Kategori</th><th>Keterangan</th><th style="text-align:right;">Nominal</th></tr>
          </thead>
          <tbody id="recent-tbody">
            <tr><td colspan="5"><div class="empty-state">Memuat data...</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/dashboard.js"></script>
</body>
</html>
